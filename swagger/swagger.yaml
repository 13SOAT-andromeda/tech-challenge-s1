      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Approval notification sent successfully"
  /orders/{id}/start-work:
    post:
      summary: "Start work on an order"
      tags:
        - Order
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Work started successfully"
  /orders/{id}/archive:
    post:
      summary: "Archive an order"
      tags:
        - Order
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Order archived successfully"
