      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateOrderRequest"
      responses:
        201:
          description: "Order created successfully"
  /orders/in-progress:
    get:
      summary: "Get in-progress orders"
      tags:
        - Order
      security:
        - Bearer: []
      responses:
        200:
          description: "A list of in-progress orders"
          schema:
            type: array
            items:
              $ref: "#/definitions/Order"
  /orders/{id}:
    get:
      summary: "Get an order by ID"
      tags:
        - Order
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Order details"
          schema:
            $ref: "#/definitions/Order"
    delete:
      summary: "Delete an order"
      tags:
        - Order
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Order deleted successfully"
  /orders/{id}/assign:
    post:
      summary: "Assign an order to the current user"
      tags:
        - Order
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Order assigned successfully"
  /orders/{id}/complete-analysis:
    post:
      summary: "Complete the analysis of an order"
      tags:
        - Order
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CompleteAnalysisRequest"
      responses:
        200:
          description: "Order analysis completed successfully"
  /orders/{id}/approve:
    post:
      summary: "Approve an order"
      tags:
        - Order
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Order approved successfully"
    get:
      summary: "Approve an order (unauthenticated)"
      tags:
        - Order
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Order approved successfully"
  /orders/{id}/reject:
    post:
      summary: "Reject an order"
      tags:
        - Order
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Order rejected successfully"
    get:
      summary: "Reject an order (unauthenticated)"
      tags:
        - Order
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Order rejected successfully"
  /orders/{id}/request-approval:
    post:
      summary: "Request approval for an order"
      tags:
