            $ref: "#/definitions/UpdateVehicleRequest"
      responses:
        200:
          description: "Vehicle updated successfully"
    delete:
      summary: "Delete a vehicle"
      tags:
        - Vehicle
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
