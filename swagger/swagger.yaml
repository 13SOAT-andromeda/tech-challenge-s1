swagger: "2.0"
info:
  title: "Tech Challenge S1 API"
  version: "1.0.0"
  description: "API for the Tech Challenge S1 project."
host: "localhost:8080"
schemes:
  - http
basePath: /
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
paths:
  /health:
    get:
      summary: "Health check"
      responses:
        200:
          description: "OK"
          schema:
            type: object
            properties:
              status:
                type: string
                example: ok
  /customers:
    get:
      summary: "Search customers"
      tags:
        - Customer
      security:
        - Bearer: []
      parameters:
        - name: document
          in: query
          type: string
        - name: name
          in: query
          type: string
        - name: status
          in: query
          type: string
        - name: email
          in: query
          type: string
      responses:
        200:
          description: "A list of customers"
          schema:
            type: array
            items:
              $ref: "#/definitions/Customer"
    post:
      summary: "Create a new customer"
      tags:
        - Customer
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateCustomerRequest"
      responses:
        201:
          description: "Customer created successfully"
  /customers/{id}:
    get:
      summary: "Get a customer by ID"
      tags:
        - Customer
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Customer details"
          schema:
            $ref: "#/definitions/Customer"
        404:
          description: "Customer not found"
    put:
      summary: "Update a customer"
      tags:
        - Customer
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateCustomerRequest"
      responses:
        200:
          description: "Customer updated successfully"
    delete:
      summary: "Delete a customer"
      tags:
        - Customer
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Customer deleted successfully"
  /customers/{id}/vehicles:
    get:
      summary: "Get customer's vehicles"
      tags:
        - Customer
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "A list of vehicles"
          schema:
            type: array
            items:
              $ref: "#/definitions/Vehicle"
  /customers/{id}/vehicles/{vehicleId}:
    post:
      summary: "Add a vehicle to a customer"
      tags:
        - Customer
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - name: vehicleId
          in: path
          required: true
          type: integer
      responses:
        201:
          description: "Vehicle associated successfully"
    delete:
      summary: "Remove a vehicle from a customer"
      tags:
        - Customer
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - name: vehicleId
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Vehicle removed successfully"
  /companies:
    post:
      summary: "Create a new company"
      tags:
        - Company
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateCompanyRequest"
      responses:
        201:
          description: "Company created successfully"
  /companies/{id}:
    get:
      summary: "Get a company by ID"
      tags:
        - Company
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Company details"
          schema:
            $ref: "#/definitions/Company"
        404:
          description: "Company not found"
    put:
      summary: "Update a company"
      tags:
        - Company
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateCompanyRequest"
      responses:
        200:
          description: "Company updated successfully"
    delete:
      summary: "Delete a company"
      tags:
        - Company
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Company deleted successfully"
  /maintenances:
    post:
      summary: "Create a new maintenance service"
      tags:
        - Maintenance
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateMaintenanceRequest"
      responses:
        201:
          description: "Maintenance created successfully"
  /maintenances/{id}:
    get:
      summary: "Get a maintenance service by ID"
      tags:
        - Maintenance
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Maintenance details"
          schema:
            $ref: "#/definitions/Maintenance"
    put:
      summary: "Update a maintenance service"
      tags:
        - Maintenance
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateMaintenanceRequest"
      responses:
        200:
          description: "Maintenance updated successfully"
    delete:
      summary: "Delete a maintenance service"
      tags:
        - Maintenance
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Maintenance deleted successfully"
  /products:
    post:
      summary: "Create a new product"
      tags:
        - Product
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateProductRequest"
      responses:
        201:
          description: "Product created successfully"
    get:
      summary: "Get all products"
      tags:
        - Product
      security:
        - Bearer: []
      responses:
        200:
          description: "A list of products"
          schema:
            type: array
            items:
              $ref: "#/definitions/Product"
  /products/{id}:
    get:
      summary: "Get a product by ID"
      tags:
        - Product
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Product details"
          schema:
            $ref: "#/definitions/Product"
    put:
      summary: "Update a product"
      tags:
        - Product
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UpdateProductRequest"
      responses:
        200:
          description: "Product updated successfully"
    delete:
      summary: "Delete a product"
      tags:
        - Product
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "Product deleted successfully"
  /products/stock:
    patch:
      summary: "Update product stock in batch"
      tags:
        - Product
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UpdateStockRequest"
      responses:
        200:
          description: "Stock updated successfully"
  /user:
    get:
      summary: "Get all users"
      tags:
        - User
      security:
        - Bearer: []
      responses:
        200:
          description: "A list of users"
          schema:
            type: array
            items:
              $ref: "#/definitions/User"
    post:
      summary: "Create a new user"
      tags:
        - User
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateUserRequest"
      responses:
        201:
          description: "User created successfully"
  /user/search:
    get:
      summary: "Search users"
      tags:
        - User
      security:
        - Bearer: []
      responses:
        200:
          description: "A list of users"
          schema:
            type: array
            items:
              $ref: "#/definitions/User"
  /user/{id}:
    get:
      summary: "Get a user by ID"
      tags:
        - User
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: "User details"
          schema:
            $ref: "#/definitions/User"
    put:
      summary: "Update a user"
      tags:
        - User
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - name: id
          in: path
          required: true
          type: integer
