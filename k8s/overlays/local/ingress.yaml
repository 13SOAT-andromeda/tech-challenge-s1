apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tech-challenge-api-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tech-challenge-api-svc
                port:
                  number: 80