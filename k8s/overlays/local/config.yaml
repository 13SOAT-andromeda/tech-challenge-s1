# DogStatsD usa DD_AGENT_HOST:8125 (UDP). Com hostPort no node, pode ser necessário
# DD_AGENT_HOST=status.hostIP via downward API no Deployment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  DB_HOST: "postgres-svc"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_NAME: "garagedb"
  DB_SSLMODE: "disable"
  DB_TIMEZONE: "UTC"
  ENV: "development"
  HTTP_PORT: "8080"
  HTTP_ALLOWED_ORIGINS: "*"
  MAILTRAP_URL: "https://send.api.mailtrap.io/api"
  API_URL: "http://localhost"
  DD_ENV: "development"
  DD_AGENT_HOST: "datadog-agent"
  DD_TRACE_AGENT_PORT: "8126"
  DD_SERVICE: "tech-challenge-api"
  DD_VERSION: "1.0.0"
  API_VERSION: "1.0.0"

---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
type: Opaque
stringData:
  DB_PASSWORD: "postgres"
  ADMIN_EMAIL: "admin@admin.com"
  ADMIN_PASSWORD: "Admin123!"
  MAILTRAP_TOKEN: "6a45f171cfc233e4edc93d8b847cf19f"
