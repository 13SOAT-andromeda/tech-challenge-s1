apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tech-challenge-api-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/tags: kubernetes.io/cluster/eks-tech-challenge=owned
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tech-challenge-api-svc
                port:
                  number: 80
