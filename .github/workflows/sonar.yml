name: Security Analysis & SonarCloud Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permissões necessárias para upload de SARIF
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-and-quality:
    name: Security & Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessário para o SonarCloud

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod tidy

      # ========== ANÁLISE DE SEGURANÇA ==========

      - name: Run Gosec Security Scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt sonarqube -out gosec-report.json -exclude-dir=internal/mocks ./...
        continue-on-error: true

      - name: Run Govulncheck (Vulnerability Scanner)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "⚠️ Vulnerabilities found but continuing..."
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
        continue-on-error: true

      # Upload para GitHub Security tab
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # ========== TESTES E COBERTURA ==========

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Generate coverage HTML report
        run: go tool cover -html=coverage.out -o coverage.html

      # ========== SONARCLOUD ==========

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=13soat-andromeda
            -Dsonar.externalIssuesReportPaths=gosec-report.json

      # ========== ARTIFACTS ==========

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            gosec-report.json
            trivy-results.sarif
            coverage.out
            coverage.html
          retention-days: 30

      # ========== QUALITY GATE ==========

      - name: Check SonarCloud Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      # ========== SUMMARY ==========

      - name: Create Security Summary
        if: always()
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Scans Completed:" >> $GITHUB_STEP_SUMMARY
          echo "- Gosec (SAST)" >> $GITHUB_STEP_SUMMARY
          echo "- Govulncheck (Dependencies)" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy (Comprehensive)" >> $GITHUB_STEP_SUMMARY
          echo "- SonarCloud (Quality & Security)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Check the **Security** tab and **SonarCloud** for detailed reports" >> $GITHUB_STEP_SUMMARY