name: Complete Go SAST
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  security-sast:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout do código
      - uses: actions/checkout@v4

      # 2️⃣ Configura Go
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      # 3️⃣ Verifica se compila
      - name: Check Build
        run: go build ./...

      # 4️⃣ Instala ferramentas de segurança
      - name: Install SAST Security Tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$GOPATH/bin" >> $GITHUB_PATH

      # 5️⃣ Executa Gosec (gera SARIF)
      - name: Run Gosec Security Scan
        run: gosec -fmt=sarif -out=gosec-report.sarif ./... || true

      # 6️⃣ Executa govulncheck (gera JSON)
      - name: Run Vulnerability Check
        run: govulncheck -json ./... > vulncheck-report.json 2>&1 || true

      # 7️⃣ Corrige SARIF inválido antes do upload
      - name: Fix SARIF format
        run: |
          dotnet tool install --global Sarif.Multitool
          export PATH="$PATH:/home/runner/.dotnet/tools"
          sarif rewrite gosec-report.sarif --output valid-gosec-report.sarif

      # 8️⃣ Upload SARIF para GitHub Security (v3)
      - name: Upload Gosec SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: valid-gosec-report.sarif

      # 9️⃣ Armazena relatórios como artefatos
      - name: Store All Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-sast-results
          path: |
            gosec-report.sarif
            valid-gosec-report.sarif
            vulncheck-report.json