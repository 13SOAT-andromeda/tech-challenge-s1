name: Deploy Application to AWS

on:
  push:
    branches: [main]
    # paths:
    #   - 'cmd/**'
    #   - 'internal/**'
    #   - 'pkg/**'
    #   - 'k8s/**'
    #   - 'Dockerfile'
    #   - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: tech-challenge-repo
          IMAGE_TAG: latest
        run: |
          # Build
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name eks-tech-challenge

      - name: Configure Metrics
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

          kubectl patch -n kube-system deployment metrics-server --type=json \
          -p '[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl wait --namespace kube-system \
          --for=condition=ready pod \
          --selector=k8s-app=metrics-server \
          --timeout=5s || true

      - name: Install Datadog Operator
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
        run: |
          helm repo add datadog https://helm.datadoghq.com
          helm install datadog-operator datadog/datadog-operator
          envsubst < k8s/base/secrets.yaml | kubectl apply -f -

      - name: Definir variáveis de banco (RDS)
        run: |
          RDS_ADDRESS=$(aws rds describe-db-instances \
            --db-instance-identifier garagedb \
            --query "DBInstances[0].Endpoint.Address" --output text)
          echo "RDS_ADDRESS=$RDS_ADDRESS" >> $GITHUB_ENV

      - name: Gerar arquivos de env do overlay
        run: |
          cat > k8s/overlays/aws/.env.secrets << 'EOF'
          DB_PASSWORD=${{ secrets.AWS_RDS_DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD=${{ secrets.USER_ADMIN_PASSWORD }}
          ADMIN_EMAIL=${{ secrets.USER_EMAIL_PASSWORD }}
          MAILTRAP_TOKEN=${{ secrets.MAILTRAP_TOKEN }}
          EOF

          cat > k8s/overlays/aws/.env.host << EOF
          DB_HOST=${RDS_ADDRESS}
          DD_SERVICE=${{ vars.DD_SERVICE }}
          DD_VERSION=${{ vars.DD_VERSION }}
          DD_SITE=${{ vars.DD_SITE }}
          EOF

      - name: Aplicar Kustomize
        run: |
          kubectl kustomize k8s/overlays/aws | \
            sed "s|ECR_IMAGE:latest|${{ steps.login-ecr.outputs.registry }}/tech-challenge-repo:latest|g" | \
            kubectl apply -f -

      - name: Aguardar Ingress ser provisionado
        run: |
          echo "Aguardando Ingress (ALB) ser provisionado..."
          timeout=300
          elapsed=0
          API_URL=""
          while [ $elapsed -lt $timeout ]; do
            API_URL=$(kubectl get ingress tech-challenge-api-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$API_URL" ]; then
              echo "LoadBalancer provisionado: $API_URL"
              break
            fi
            echo "Aguardando... ($elapsed/$timeout segundos)"
            sleep 5
            elapsed=$((elapsed + 5))
          done

          if [ -z "$API_URL" ]; then
            echo "Erro: LoadBalancer não foi provisionado a tempo"
            exit 1
          fi

          echo "API_URL=http://$API_URL" >> $GITHUB_ENV

      - name: Atualizar ConfigMap com API_URL
        run: |
          kubectl patch configmap api-config --type merge -p "{\"data\":{\"API_URL\":\"${API_URL}\"}}"

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment tech-challenge-api
