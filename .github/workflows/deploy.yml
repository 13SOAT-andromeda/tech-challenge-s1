name: Deploy EKS

on:

  push:
    branches: [ main ]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'k8s/**'
      - 'Dockerfile'

  pull_request:
    branches: [ main ]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'k8s/**'
      - 'Dockerfile'

  workflow_run:
    workflows: ["Deploy Infra"]
    types:
      - completed

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: AWS
    env:
      AWS_REGION: us-east-1
      TF_VAR_cluster_name: tech-challenge-api-cluster


    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.AWS_ECR_REPO }}
          IMAGE_TAG: latest
        run: |
          # Build
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.EKS_CLUSTER }}

      - name: Deploy to K8s
        run: |
          RDS_ADDRESS=$(aws rds describe-db-instances --query "DBInstances[0].Endpoint.Address" --output text)
          
          cd k8s/overlays/aws
          
          cat <<'EOF' > .env.secrets
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          MAILTRAP_TOKEN=${{ secrets.MAILTRAP_TOKEN }}
          ADMIN_EMAIL=${{ vars.ADMIN_EMAIL }}
          EOF
          
          echo "DB_HOST=$RDS_ADDRESS" > .env.host
          
          FULL_IMAGE_NAME=${{ steps.login-ecr.outputs.registry }}/${{ vars.AWS_ECR_REPO }}:latest
          
          kustomize build . | \
          kubectl apply -f - --prune -l app=tech-challenge-api
          
          kubectl rollout restart deployment tech-challenge-api
          
#          kubectl create secret generic api-secrets \
#            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
#            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
#            --from-literal=ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
#            --from-literal=MAILTRAP_TOKEN="${{ secrets.MAILTRAP_TOKEN }}" \
#            --dry-run=client -o yaml | kubectl apply -f -
#
