version: "3.8"

services:
  db:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - tech-challenge

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: "${ENV}" # checks if make sense ever define as development
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DD_AGENT_HOST: datadog-agent
      DD_ENV: ${ENV:-local}
      DD_SERVICE: ${DD_SERVICE:-tech-challenge-api}
      DD_VERSION: ${API_VERSION:-1.0.0}
    ports:
      - "8080:8080"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tech-challenge

  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    env_file:
      - .env
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE}

      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"

      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"

      DD_APPSEC_ENABLED: "true"
      DD_REMOTE_CONFIGURATION_ENABLED: "true"
      DD_UNIVERSAL_SERVICE_MONITORING_ENABLED: "true"

      DD_PROCESS_CONFIG_PROCESS_COLLECTION_ENABLED: "true"

      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
    ports:
      - "8125:8125/udp"
      - "8126:8126"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - ./datadog/conf.d/http_check.yaml:/etc/datadog-agent/conf.d/http_check.yaml:ro
    networks:
      - tech-challenge

volumes:
  db_data:

networks:
  tech-challenge:
    name: tech-challenge
    driver: bridge
