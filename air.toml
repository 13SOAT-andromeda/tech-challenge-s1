root = "."
tmp_dir = "tmp"

[build]
  # Build the actual server that lives in ./cmd/api
  cmd = "go build -o ./tmp/main ./cmd/api"
  # Path to the built binary (relative to project root)
  bin = "tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  exclude_dir = ["tmp", "vendor", ".git"]
  delay = 1000

[log]
  time = true

